name: Devops CI Pipeline


on:
  push:
    branches:
     - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUb_TOKEN }}

      - name: Build Docker image with both tags
        run: |
          docker build -t saitejajinna/devops-demo-app:latest \
                       -t saitejajinna/devops-demo-app:${{ github.sha }} .


      - name: Run container test
        run: docker run -d saitejajinna/devops-demo-app:${{ github.sha }}

      - name: push latest tag
        run: docker push saitejajinna/devops-demo-app:latest

      - name: Push commit SHA tag
        run: docker push saitejajinna/devops-demo-app:${{ github.sha }}

      - name: Deploy to kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml

